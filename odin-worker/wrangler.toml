name = "odin-worker"
main = "src/index.ts"
compatibility_date = "2025-03-24"
compatibility_flags = ["nodejs_compat"]

[vars]
PUBLIC_URL = "https://odin-worker.workers.dev"

[[r2_buckets]]
binding = "R2_BUCKET"
bucket_name = "odin-files"
preview_bucket_name = "odin-files-preview"

[[kv_namespaces]]
binding = "KV_METADATA"
# TODO (Task 13): Replace with real IDs from: npx wrangler kv namespace create odin-metadata
# Until then, `wrangler dev` will fail — use `npm test` (miniflare) for local development.
id = "REPLACE_WITH_KV_NAMESPACE_ID"
preview_id = "REPLACE_WITH_KV_PREVIEW_ID"

[triggers]
crons = ["0 * * * *"]
